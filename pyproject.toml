[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "integration: tests that require a live Docker daemon and sandbox images",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.12"
strict = true
files = ["server"]

[[tool.mypy.overrides]]
module = ["docker.*", "requests.*", "dotenv.*", "mcp.*", "pydantic.*", "starlette.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "server.main"
disable_error_code = ["untyped-decorator"]

[[tool.mypy.overrides]]
module = "prometheus_client"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "prometheus_client.*"
ignore_missing_imports = true
