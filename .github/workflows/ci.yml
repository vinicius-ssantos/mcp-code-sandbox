name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  hadolint:
    name: Lint Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Run hadolint
        run: find . -name "Dockerfile*" -not -path "./.git/*" | sort | xargs hadolint

  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install -r requirements-dev.txt

      - name: ruff lint
        run: ruff check server/ tests/

      - name: ruff format check
        run: ruff format --check server/ tests/

      - name: mypy
        run: mypy server/

  unit-tests:
    name: Unit tests
    # Unit tests mock Docker and do not require the daemon; safe on any runner,
    # including fork PRs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install -r requirements-dev.txt

      - name: pytest (unit)
        run: pytest tests/ -v -m "not integration"

  integration-tests:
    name: Integration tests (Docker)
    # Integration tests spawn real sandbox containers and require Docker on the
    # host. Keep this on GitHub-hosted runners unless the dedicated
    # python-docker-ci self-hosted runner is online and validated.
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r server/requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Build sandbox images
        run: |
          if docker compose version >/dev/null 2>&1; then
            docker compose --profile build build
          else
            docker-compose --profile build build
          fi

      - name: pytest (integration)
        run: python -m pytest tests/ -v -m integration
