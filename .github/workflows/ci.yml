name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  hadolint:
    name: Lint Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install hadolint
        env:
          HADOLINT_VERSION: v2.14.0
          HADOLINT_SHA256: 6bf226944684f56c84dd014e8b979d27425c0148f61b3bd99bcc6f39e9dc5a47
        run: |
          wget -qO /usr/local/bin/hadolint \
            "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          echo "${HADOLINT_SHA256}  /usr/local/bin/hadolint" | sha256sum --check -
          chmod +x /usr/local/bin/hadolint

      - name: Run hadolint
        run: find . -name "Dockerfile*" -not -path "./.git/*" | sort | xargs hadolint

  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install -r requirements-dev.txt

      - name: ruff lint
        run: ruff check server/ tests/

      - name: ruff format check
        run: ruff format --check server/ tests/

      - name: mypy
        run: mypy server/

      - name: pip-audit
        run: pip-audit -r server/requirements.txt --desc on

  trivy:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Trivy
        env:
          TRIVY_VERSION: 0.71.0
          TRIVY_SHA256: 30a3d22b23f88c233f1658f562fb477cae3b3e8b4761109d515b7698daf85814
        run: |
          wget -qO /tmp/trivy.tar.gz \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          echo "${TRIVY_SHA256}  /tmp/trivy.tar.gz" | sha256sum --check -
          tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy

      - name: Scan Python dependencies for CVEs
        run: trivy fs --format table --exit-code 1 --severity CRITICAL,HIGH server/requirements.lock

  unit-tests:
    name: Unit tests
    # Unit tests mock Docker and do not require the daemon; safe on any runner,
    # including fork PRs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install -r requirements-dev.txt

      - name: pytest (unit)
        run: pytest tests/ -v -m "not integration"

  integration-tests:
    name: Integration tests (Docker)
    # Integration tests spawn real sandbox containers and require Docker on the
    # host. Keep this on GitHub-hosted runners unless the dedicated
    # python-docker-ci self-hosted runner is online and validated.
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r server/requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Build sandbox images
        run: |
          if docker compose version >/dev/null 2>&1; then
            docker compose --profile build build
          else
            docker-compose --profile build build
          fi

      - name: pytest (integration)
        run: python -m pytest tests/ -v -m integration
