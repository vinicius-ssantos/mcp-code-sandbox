name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  hadolint:
    name: Lint Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install hadolint
        env:
          HADOLINT_VERSION: v2.14.0
          HADOLINT_SHA256: 6bf226944684f56c84dd014e8b979d27425c0148f61b3bd99bcc6f39e9dc5a47
        run: |
          wget -qO /usr/local/bin/hadolint \
            "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          echo "${HADOLINT_SHA256}  /usr/local/bin/hadolint" | sha256sum --check -
          chmod +x /usr/local/bin/hadolint

      - name: Run hadolint
        run: find . -name "Dockerfile*" -not -path "./.git/*" | sort | xargs hadolint

  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install -r requirements-dev.txt

      - name: ruff lint
        run: ruff check server/ tests/

      - name: ruff format check
        run: ruff format --check server/ tests/

      - name: mypy
        run: mypy server/

      - name: pip-audit
        run: pip-audit -r server/requirements.txt --desc on

  trivy:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Scan Python dependencies for CVEs
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d97a5 # v0.30.0
        with:
          scan-type: fs
          scan-ref: server/requirements.lock
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  unit-tests:
    name: Unit tests
    # Unit tests mock Docker and do not require the daemon; safe on any runner,
    # including fork PRs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install -r requirements-dev.txt

      - name: pytest (unit)
        run: pytest tests/ -v -m "not integration"

  integration-tests:
    name: Integration tests (Docker)
    # Integration tests spawn real sandbox containers and require Docker on the
    # host. Skipped for fork PRs — untrusted code must not run on the
    # self-hosted runner.
    if: github.event.pull_request.head.repo.fork != true
    runs-on: [self-hosted, linux, x64, python-ci]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Python is pre-installed on the self-hosted runner; setup-python is not
      # used here because its version manifest does not cover the runner's OS.
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r server/requirements.txt
          python3 -m pip install -r requirements-dev.txt

      - name: Build sandbox images
        run: |
          if docker compose version >/dev/null 2>&1; then
            docker compose --profile build build
          else
            docker-compose --profile build build
          fi

      - name: pytest (integration)
        run: python3 -m pytest tests/ -v -m integration
